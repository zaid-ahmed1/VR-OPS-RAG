# /etc/nginx/sites-available/vr-ops
# Symlink to enable: sudo ln -s /etc/nginx/sites-available/vr-ops /etc/nginx/sites-enabled/vr-ops

server {
    listen 80;
    server_name _;

    # ── FastAPI (RAG backend) ─────────────────────────────────────────────────
    # Strip /api prefix before proxying
    location /api/ {
        proxy_pass         http://localhost:8000/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Streamlit dashboard (default route) ───────────────────────────────────
    # Streamlit requires WebSocket support for live updates
    location / {
        proxy_pass         http://localhost:8051;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_read_timeout 86400s;
    }

    # PostgREST is NOT exposed through nginx — the Streamlit Python process
    # calls it directly on localhost:3000 (server-side only).
}

